<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>打飞机</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;display:flex;justify-content:center;align-items:center;font-family:"Segoe UI",Arial,sans-serif}
canvas{display:block}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;justify-content:center;align-items:center;background:rgba(10,10,26,.92);z-index:10}
.overlay.hidden{display:none!important}
.box{background:#14142a;border:1px solid #2a3a5a;border-radius:10px;padding:28px 30px;text-align:center;box-shadow:0 0 50px rgba(0,120,255,.12);min-width:280px;max-width:90vw}
.box h2{color:#44ccff;font:bold 22px "Segoe UI",Arial,sans-serif;margin-bottom:16px}
.box input{background:#0a0a1a;border:1px solid #3a5a8a;color:#fff;font:16px "Segoe UI",Arial,sans-serif;padding:10px 14px;border-radius:6px;width:220px;max-width:80vw;text-align:center;outline:none;transition:border .2s;display:block;margin:0 auto 10px auto}
.box input:focus{border-color:#44ccff}
.box input::placeholder{color:#445}
.box button{background:#1a5a9a;color:#fff;border:none;font:15px "Segoe UI",Arial,sans-serif;padding:10px 22px;border-radius:6px;cursor:pointer;margin:4px 4px;transition:background .2s}
.box button:hover,.box button:active{background:#2a7acf}
.box .tip{color:#667;font:13px "Segoe UI",Arial,sans-serif;margin-top:8px}
.box .err{color:#f44;font:13px "Segoe UI",Arial,sans-serif;margin-top:6px;min-height:18px}
</style>
</head>
<body>

<div id="auth-panel" class="overlay">
<div class="box">
<h2>打飞机</h2>
<input id="auth-user" type="text" placeholder="用户名" maxlength="12" autofocus>
<input id="auth-pass" type="password" placeholder="密码" maxlength="20">
<div id="auth-err" class="err"></div>
<button id="auth-login">登录</button>
<button id="auth-reg">注册</button>
<div class="tip">已有账号直接登录，新用户点击注册</div>
</div>
</div>

<canvas id="g"></canvas>
<script>
(function(){
var c=document.getElementById("g"),x=c.getContext("2d");
var W=480,H=720,S={MENU:0,PLAYING:1,GAMEOVER:2};
var gs=S.MENU,sc=0,hs=0,un="",loadingAuth=false;
var rankCache=[],rankTimer=0;

// ---- Supabase REST API ----
function sbFetch(table,method,body,qs){
  return fetch("https://evplnfgzjnfufoqoodma.supabase.co/rest/v1/"+table+(qs||""),{
    method:method||"GET",
    headers:{"apikey":"sb_publishable_u9NV2ynfWDLAwa-U2e2-gw_AEef1nfr","Authorization":"Bearer sb_publishable_u9NV2ynfWDLAwa-U2e2-gw_AEef1nfr","Content-Type":"application/json","Prefer":"return=representation,resolution=merge-duplicates"},
    body:body?JSON.stringify(body):null
  }).then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error(t)});return r.json()});
}

function apiRegister(u,p){return sbFetch("accounts","POST",{username:u,password:p})}
function apiLogin(u,p){
  return sbFetch("accounts","GET",null,"?username=eq."+encodeURIComponent(u)+"&select=*").then(function(a){
    if(!a||!a.length)throw new Error("用户不存在");if(a[0].password!==p)throw new Error("密码错误");return a[0];
  });
}
function apiGetScore(u){
  return sbFetch("scores","GET",null,"?username=eq."+encodeURIComponent(u)+"&select=score").then(function(a){return a&&a.length?a[0].score:0});
}
function apiSaveScore(u,s){return sbFetch("scores","PATCH",{score:s},"?username=eq."+encodeURIComponent(u)+"&score=lt."+s).then(function(r){if(!r||!r.length||r.length===0){return sbFetch("scores","POST",{username:u,score:s},"?on_conflict=username")}})}function apiRank(){
  return sbFetch("scores","GET",null,"?order=score.desc&limit=10&select=username,score");
}

// ---- 认证 ----
var authPanel=document.getElementById("auth-panel"),authUser=document.getElementById("auth-user");
var authPass=document.getElementById("auth-pass"),authErr=document.getElementById("auth-err");
var loginBtn=document.getElementById("auth-login"),regBtn=document.getElementById("auth-reg");

function setL(v){loadingAuth=v;loginBtn.disabled=v;regBtn.disabled=v;loginBtn.style.opacity=v?".6":"1";regBtn.style.opacity=v?".6":"1"}
function doLogin(){
  if(loadingAuth)return;var u=authUser.value.trim(),p=authPass.value.trim();
  if(!u||!p){authErr.textContent="请输入用户名和密码";return}
  setL(true);authErr.textContent="登录中...";authErr.style.color="#8ac";
  apiLogin(u,p).then(function(){authOk(u)}).catch(function(e){authErr.textContent=e.message;authErr.style.color="#f44";setL(false)});
}
function doReg(){
  if(loadingAuth)return;var u=authUser.value.trim(),p=authPass.value.trim();
  if(!u||!p){authErr.textContent="请输入用户名和密码";return}
  if(u.length<2||u.length>12){authErr.textContent="用户名需2-12个字符";return}
  if(p.length<3||p.length>20){authErr.textContent="密码需3-20个字符";return}
  setL(true);authErr.textContent="注册中...";authErr.style.color="#8ac";
  apiRegister(u,p).then(function(){authErr.textContent="注册成功！";authErr.style.color="#4c4";setTimeout(function(){authErr.style.color="#f44";authErr.textContent="";setL(false)},1200)})
  .catch(function(e){var m=e.message;if(m.indexOf("duplicate")>=0||m.indexOf("unique")>=0)m="用户已存在";authErr.textContent=m;authErr.style.color="#f44";setL(false)});
}
function authOk(u){un=u;sc=0;apiGetScore(u).then(function(s){hs=s;authPanel.classList.add("hidden");gs=S.MENU;resize();fetchRank()})}
loginBtn.addEventListener("click",function(){initAudio();doLogin()});regBtn.addEventListener("click",function(){initAudio();doReg()});
authUser.addEventListener("keydown",function(e){if(e.key==="Enter")authPass.focus()});
authPass.addEventListener("keydown",function(e){if(e.key==="Enter")doLogin()});


// ---- 音效系统（Web Audio 合成） ----
var audioCtx=null;
function initAudio(){if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}}
function playShoot(){
  if(!audioCtx)return;
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type="square";o.frequency.setValueAtTime(880,audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(440,audioCtx.currentTime+.05);
  g.gain.setValueAtTime(.08,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.08);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+.08);
}
function playExplosion(){
  if(!audioCtx)return;
  var bufferSize=audioCtx.sampleRate*.15;
  var buffer=audioCtx.createBuffer(1,bufferSize,audioCtx.sampleRate);
  var data=buffer.getChannelData(0);
  for(var i=0;i<bufferSize;i++){
    var t=i/audioCtx.sampleRate;
    data[i]=(Math.random()*2-1)*Math.exp(-t*25)*Math.sin(t*2000);
  }
  var source=audioCtx.createBufferSource();
  source.buffer=buffer;
  var g=audioCtx.createGain();g.gain.setValueAtTime(.15,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.15);
  source.connect(g);g.connect(audioCtx.destination);
  source.start();
}
function playGameOver(){
  if(!audioCtx)return;
  var t=audioCtx.currentTime;
  [440,370,330,260].forEach(function(f,i){
    var o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type="sawtooth";o.frequency.setValueAtTime(f,t+i*.12);
    g.gain.setValueAtTime(.1,t+i*.12);g.gain.exponentialRampToValueAtTime(.001,t+i*.12+.2);
    o.connect(g);g.connect(audioCtx.destination);
    o.start(t+i*.12);o.stop(t+i*.12+.2);
  });
}
function playNewRecord(){
  if(!audioCtx)return;
  var t=audioCtx.currentTime;
  [523,659,784,1047].forEach(function(f,i){
    var o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type="sine";o.frequency.setValueAtTime(f,t+i*.1);
    g.gain.setValueAtTime(.12,t+i*.1);g.gain.exponentialRampToValueAtTime(.001,t+i*.1+.3);
    o.connect(g);g.connect(audioCtx.destination);
    o.start(t+i*.1);o.stop(t+i*.1+.3);
  });
}

function fetchRank(){apiRank().then(function(d){rankCache=d||[]})}

// ---- 自适应 ----
function resize(){
  var s=Math.min(window.innerWidth/W,window.innerHeight/H);
  c.style.width=Math.floor(W*s)+"px";c.style.height=Math.floor(H*s)+"px";c.width=W;c.height=H;
}
window.addEventListener("resize",resize);window.addEventListener("orientationchange",function(){setTimeout(resize,200)});

// ---- 游戏 ----
var p={x:W/2,y:H-80,w:36,h:36,spd:5,shield:0},bl=[],en=[],ex=[],pu=[],ky={};
var BS=8,BC=8,bt=0,EW=32,EH=28,BP=1.6,st=0,si=28,touchId=null,blLevel=0,waveScore=0,isBoss=false,boss=null;
function spawnEnemy(){var r=Math.random();var t='normal';if(sc>3000&&r<.12)t='tank';else if(sc>1500&&r<.28)t='fast';else if(sc>500&&r<.45)t='zigzag';var x=Math.random()*(W-EW*2)+EW,sp=BP+Math.random()*.8;var hp=1,sz=1,cl='#d34';if(t==='tank'){hp=3;sz=1.5;sp=.8;cl='#a0f'}else if(t==='fast'){hp=1;sz=.8;sp=3+Math.random()*1;cl='#f80'}else if(t==='zigzag'){hp=1;sz=1;sp=1.2+Math.random()*.5;cl='#0dd'}en.push({x:x,y:-EH*sz,w:EW*sz,h:EH*sz,spd:sp,hp:hp,maxHp:hp,type:t,clr:cl,ph:Math.random()*Math.PI*2})}
function spawnPU(x,y){if(Math.random()>.25)return;var t=Math.random()<.5?'B':'S';pu.push({x:x,y:y,w:16,h:16,ty:t,spd:1,lf:300})}
function spawnBoss(){isBoss=true;boss={x:W/2,y:-60,w:80,h:60,hp:10+Math.floor(sc/2000)*2,mx:10+Math.floor(sc/2000)*2,spd:1.2,dir:1,tm:0,cl:'#f22'}}
function updB(){if(!boss||gs!=S.PLAYING)return;boss.x+=boss.spd*boss.dir;if(boss.x>W-boss.w/2||boss.x<boss.w/2)boss.dir*=-1;if(boss.y<120)boss.y+=0.8;boss.tm++;if(boss.tm%40===0){for(var a=-1;a<=1;a++)bl.push({x:boss.x,y:boss.y+boss.h/2,spd:3+Math.abs(a),en:true})}}
function chkB(){for(var i=bl.length-1;i>=0;i--){var b=bl[i];if(b.en)continue;if(Math.abs(b.x-boss.x)<boss.w/2&&Math.abs(b.y-boss.y)<boss.h/2){boss.hp--;bl.splice(i,1);if(boss.hp<=0){addExp(boss.x,boss.y,16);sc+=500;isBoss=false;boss=null;playExplosion();playNewRecord()}break}}}
function drPU(){for(var i=0;i<pu.length;i++){var d=pu[i];d.y+=d.spd;d.lf--;if(d.lf<=0||d.y>H+20){pu.splice(i,1);i--;continue}x.save();x.shadowColor='#0f0';x.shadowBlur=15;x.fillStyle=d.ty==='B'?'#0f0':'#0ff';x.beginPath();x.arc(d.x,d.y,8,0,Math.PI*2);x.fill();x.fillStyle='#fff';x.font='10px Segoe UI';x.textAlign='center';x.fillText(d.ty,d.x,d.y+4);x.restore();if(Math.abs(p.x-d.x)<p.w/2+8&&Math.abs(p.y-d.y)<p.h/2+8){if(d.ty==='B')blLevel=Math.min(blLevel+1,3);else p.shield=1;pu.splice(i,1);i--}}}
function addExp(x,y,c){var cs=['#ff4400','#ff8800','#ffcc00','#fff'];for(var i=0;i<(c||8);i++){var a=Math.random()*Math.PI*2,s=1+Math.random()*3;ex.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,lf:20+Math.random()*15,sz:2+Math.random()*3,cs:cs})}}
function upd(){if(gs!=S.PLAYING)return;if(ky['ArrowLeft']||ky['a']||ky['A'])p.x-=p.spd;if(ky['ArrowRight']||ky['d']||ky['D'])p.x+=p.spd;p.x=Math.max(p.w/2,Math.min(W-p.w/2,p.x));if(!isBoss&&sc>0&&sc%2000<100&&sc-waveScore>1800){waveScore=sc;spawnBoss();playNewRecord()}if(isBoss){updB();chkB()}bt++;if(bt>=BC){bt=0;if(blLevel===0){bl.push({x:p.x,y:p.y-p.h/2,spd:BS})}else if(blLevel===1){bl.push({x:p.x-6,y:p.y-p.h/2,spd:BS});bl.push({x:p.x+6,y:p.y-p.h/2,spd:BS})}else if(blLevel===2){bl.push({x:p.x-12,y:p.y-p.h/2+4,spd:BS});bl.push({x:p.x,y:p.y-p.h/2,spd:BS});bl.push({x:p.x+12,y:p.y-p.h/2+4,spd:BS})}else{bl.push({x:p.x-14,y:p.y-p.h/2+6,spd:BS*.9});bl.push({x:p.x-5,y:p.y-p.h/2,spd:BS});bl.push({x:p.x+5,y:p.y-p.h/2,spd:BS});bl.push({x:p.x+14,y:p.y-p.h/2+6,spd:BS*.9})}playShoot()}for(var i=bl.length-1;i>=0;i--){bl[i].y-=bl[i].spd||BS;if(bl[i].y<-10||(bl[i].en&&bl[i].y>H+10))bl.splice(i,1)}st++;if(st>=si&&!isBoss){st=0;spawnEnemy();if(si>12)si-=.3}for(var i=en.length-1;i>=0;i--){var e=en[i];if(e.type==='zigzag')e.x+=Math.sin(e.ph+Date.now()/400)*2;e.y+=e.spd;if(e.y>H+20||e.x<-40||e.x>W+40){en.splice(i,1);continue}}for(var i=bl.length-1;i>=0;i--){var b=bl[i];if(b.en)continue;var u=0;for(var j=en.length-1;j>=0;j--){var e=en[j];if(b.x>e.x-e.w/2&&b.x<e.x+e.w/2&&b.y>e.y-e.h/2&&b.y<e.y+e.h/2){e.hp--;bl.splice(i,1);u=1;if(e.hp<=0){addExp(e.x,e.y,8);spawnPU(e.x,e.y);en.splice(j,1);sc+=100+(e.type==='tank'?200:0);playExplosion()}break}}if(u)break}for(var i=en.length-1;i>=0;i--){var e=en[i];if(p.x-p.w/2<e.x+e.w/2&&p.x+p.w/2>e.x-e.w/2&&p.y-p.h/2<e.y+e.h/2&&p.y+p.h/2>e.y-e.h/2){if(p.shield>0){p.shield=0;en.splice(i,1);addExp(e.x,e.y,8);playExplosion();continue}addExp(p.x,p.y,12);en.splice(i,1);gs=S.GAMEOVER;rankTimer=0;if(sc>hs){hs=sc;apiSaveScore(un,sc);playNewRecord()}else{playGameOver()};fetchRank();break}}if(isBoss&&boss&&Math.abs(p.x-boss.x)<p.w/2+boss.w/2&&Math.abs(p.y-boss.y)<p.h/2+boss.h/2){if(p.shield>0){p.shield=0;addExp(boss.x,boss.y,12)}else{addExp(p.x,p.y,12);gs=S.GAMEOVER;rankTimer=0;if(sc>hs){hs=sc;apiSaveScore(un,sc);playNewRecord()}else{playGameOver()};fetchRank()}}drPU();for(var i=ex.length-1;i>=0;i--){var f=ex[i];f.x+=f.vx;f.y+=f.vy;f.lf--;if(f.lf<=0)ex.splice(i,1)}}
function drP(){var px=p.x,py=p.y;x.save();x.shadowColor='#0cf';x.shadowBlur=15;x.fillStyle='#4cf';x.beginPath();x.moveTo(px,py-18);x.quadraticCurveTo(px+10,py-10,px+14,py);x.quadraticCurveTo(px+12,py+14,px+6,py+18);x.lineTo(px-6,py+18);x.quadraticCurveTo(px-12,py+14,px-14,py);x.quadraticCurveTo(px-10,py-10,px,py-18);x.fill();x.shadowBlur=0;x.fillStyle='#8ef';x.beginPath();x.ellipse(px,py-6,5,8,0,0,Math.PI*2);x.fill();x.fillStyle='#39d';x.beginPath();x.moveTo(px-14,py+2);x.lineTo(px-22,py+8);x.lineTo(px-14,py+12);x.closePath();x.fill();x.beginPath();x.moveTo(px+14,py+2);x.lineTo(px+22,py+8);x.lineTo(px+14,py+12);x.closePath();x.fill();x.shadowColor='#f80';x.shadowBlur=20;var f=Math.sin(Date.now()/80)*4;var g=x.createLinearGradient(px,py+16,px,py+28+f);g.addColorStop(0,'rgba(255,136,0,.9)');g.addColorStop(.5,'rgba(255,68,0,.5)');g.addColorStop(1,'rgba(255,0,0,0)');x.fillStyle=g;x.beginPath();x.moveTo(px-6,py+16);x.quadraticCurveTo(px,py+28+f,px+6,py+16);x.fill();if(p.shield>0){x.shadowBlur=20;x.shadowColor='#0ff';x.strokeStyle='rgba(0,255,255,.5)';x.lineWidth=3;x.beginPath();x.arc(px,py,26,0,Math.PI*2);x.stroke()}x.restore()}
function drE(e){var a=e.x,b=e.y;x.save();x.shadowColor=e.clr||'#f24';x.shadowBlur=10;var sw=e.w/32,sh=e.h/28;x.fillStyle=e.clr||'#d34';if(!e.type||e.type==='normal'){x.beginPath();x.moveTo(a,b-18*sh);x.quadraticCurveTo(a+12*sw,b-8*sh,a+16*sw,b+2*sh);x.quadraticCurveTo(a+14*sw,b+12*sh,a+8*sw,b+18*sh);x.lineTo(a+3*sw,b+12*sh);x.lineTo(a-3*sw,b+12*sh);x.lineTo(a-8*sw,b+18*sh);x.quadraticCurveTo(a-14*sw,b+12*sh,a-16*sw,b+2*sh);x.quadraticCurveTo(a-12*sw,b-8*sh,a,b-18*sh);x.closePath();x.fill();x.fillStyle=e.clr||'#a23';x.beginPath();x.moveTo(a-12*sw,b+4*sh);x.lineTo(a-20*sw,b+10*sh);x.lineTo(a-12*sw,b+14*sh);x.closePath();x.fill();x.beginPath();x.moveTo(a+12*sw,b+4*sh);x.lineTo(a+20*sw,b+10*sh);x.lineTo(a+12*sw,b+14*sh);x.closePath();x.fill();x.shadowBlur=0;x.fillStyle='#f66';x.beginPath();x.ellipse(a,b-4*sh,4*sw,6*sh,0,0,Math.PI*2);x.fill();}else if(e.type==='tank'){x.beginPath();x.moveTo(a,b-20*sh);x.quadraticCurveTo(a+14*sw,b-10*sh,a+18*sw,b+2*sh);x.lineTo(a+12*sw,b+16*sh);x.lineTo(a+8*sw,b+10*sh);x.lineTo(a-8*sw,b+10*sh);x.lineTo(a-12*sw,b+16*sh);x.lineTo(a-18*sw,b+2*sh);x.quadraticCurveTo(a-14*sw,b-10*sh,a,b-20*sh);x.closePath();x.fill();x.fillStyle='#82a';x.beginPath();x.moveTo(a-14*sw,b+4*sh);x.lineTo(a-22*sw,b+12*sh);x.lineTo(a-14*sw,b+14*sh);x.closePath();x.fill();x.beginPath();x.moveTo(a+14*sw,b+4*sh);x.lineTo(a+22*sw,b+12*sh);x.lineTo(a+14*sw,b+14*sh);x.closePath();x.fill();x.shadowBlur=0;x.fillStyle='#c8f';x.beginPath();x.ellipse(a,b-6*sh,4*sw,5*sh,0,0,Math.PI*2);x.fill();x.beginPath();x.ellipse(a-6*sw,b-2*sh,2*sw,3*sh,0,0,Math.PI*2);x.fill();}else if(e.type==='fast'){x.beginPath();x.moveTo(a,b-22*sh);x.quadraticCurveTo(a+10*sw,b-8*sh,a+14*sw,b+4*sh);x.quadraticCurveTo(a+10*sw,b+12*sh,a+6*sw,b+16*sh);x.lineTo(a,b+10*sh);x.lineTo(a-6*sw,b+16*sh);x.quadraticCurveTo(a-10*sw,b+12*sh,a-14*sw,b+4*sh);x.quadraticCurveTo(a-10*sw,b-8*sh,a,b-22*sh);x.closePath();x.fill();x.fillStyle='#c60';x.beginPath();x.moveTo(a-10*sw,b+2*sh);x.lineTo(a-24*sw,b+12*sh);x.lineTo(a-14*sw,b+10*sh);x.closePath();x.fill();x.beginPath();x.moveTo(a+10*sw,b+2*sh);x.lineTo(a+24*sw,b+12*sh);x.lineTo(a+14*sw,b+10*sh);x.closePath();x.fill();x.shadowBlur=0;x.fillStyle='#fc8';x.beginPath();x.ellipse(a,b-6*sh,3*sw,5*sh,0,0,Math.PI*2);x.fill();}else if(e.type==='zigzag'){x.beginPath();x.moveTo(a,b-18*sh);x.lineTo(a+16*sw,b-4*sh);x.lineTo(a+12*sw,b+12*sh);x.lineTo(a+8*sw,b+6*sh);x.lineTo(a-8*sw,b+6*sh);x.lineTo(a-12*sw,b+12*sh);x.lineTo(a-16*sw,b-4*sh);x.closePath();x.fill();x.fillStyle='#099';x.beginPath();x.moveTo(a-12*sw,b+2*sh);x.lineTo(a-26*sw,b+10*sh);x.lineTo(a-16*sw,b+8*sh);x.closePath();x.fill();x.beginPath();x.moveTo(a+12*sw,b+2*sh);x.lineTo(a+26*sw,b+10*sh);x.lineTo(a+16*sw,b+8*sh);x.closePath();x.fill();x.shadowBlur=0;x.fillStyle='#8ff';x.beginPath();x.ellipse(a,b-4*sh,3*sw,5*sh,0,0,Math.PI*2);x.fill();}if(e.maxHp>1){x.shadowBlur=0;x.fillStyle='#333';x.fillRect(a-e.w/2,b-e.h/2-8,e.w,4);x.fillStyle='#0f0';x.fillRect(a-e.w/2,b-e.h/2-8,e.w*(e.hp/e.maxHp),4)}x.restore()}function drB(){x.save();for(var i=0;i<bl.length;i++){var b=bl[i];if(b.en){x.shadowColor='#f00';x.shadowBlur=10;x.fillStyle='#f44';x.fillRect(b.x-4,b.y-4,8,8);continue}x.shadowColor='#0ff';x.shadowBlur=12;var g=x.createLinearGradient(b.x,b.y-6,b.x,b.y+6);g.addColorStop(0,'#0ff');g.addColorStop(1,'#08f');x.fillStyle=g;x.fillRect(b.x-2,b.y-6,4,12)}x.restore()}
function drBoss(){if(!boss)return;var bx=boss.x,by=boss.y;x.save();x.shadowColor='#f00';x.shadowBlur=30;var bw=boss.w/2,bh=boss.h/2;x.shadowColor='#f00';x.shadowBlur=30;x.fillStyle=boss.cl||'#f22';x.beginPath();x.moveTo(bx,by-bh-6);x.quadraticCurveTo(bx+bw*.6,by-bh*.3,bx+bw,by+bh*.2);x.quadraticCurveTo(bx+bw*.7,by+bh*.6,bx+bw*.4,by+bh);x.lineTo(bx+bw*.15,by+bh*.6);x.lineTo(bx-bw*.15,by+bh*.6);x.lineTo(bx-bw*.4,by+bh);x.quadraticCurveTo(bx-bw*.7,by+bh*.6,bx-bw,by+bh*.2);x.quadraticCurveTo(bx-bw*.6,by-bh*.3,bx,by-bh-6);x.closePath();x.fill();x.shadowBlur=20;x.fillStyle='#a00';x.beginPath();x.moveTo(bx-bw*.6,by+bh*.1);x.lineTo(bx-bw*1.3,by+bh*.5);x.lineTo(bx-bw*.6,by+bh*.7);x.closePath();x.fill();x.beginPath();x.moveTo(bx+bw*.6,by+bh*.1);x.lineTo(bx+bw*1.3,by+bh*.5);x.lineTo(bx+bw*.6,by+bh*.7);x.closePath();x.fill();x.shadowBlur=0;x.fillStyle='#ff6666';x.beginPath();x.ellipse(bx,by-bh*.3,bw*.25,bh*.35,0,0,Math.PI*2);x.fill();x.shadowColor='#f80';x.shadowBlur=25;var flick=Math.sin(Date.now()/100)*3;var eg=x.createLinearGradient(bx,by+bh*.4,bx,by+bh*.8+flick);eg.addColorStop(0,'rgba(255,136,0,.9)');eg.addColorStop(.5,'rgba(255,68,0,.5)');eg.addColorStop(1,'rgba(255,0,0,0)');x.fillStyle=eg;x.beginPath();x.moveTo(bx-bw*.12,by+bh*.5);x.quadraticCurveTo(bx,by+bh*.8+flick,bx+bw*.12,by+bh*.5);x.fill();x.shadowBlur=0;x.fillStyle='#333';x.fillRect(bx-bw*.6,by-bh-12,bw*1.2,6);var hpPct=boss.hp/boss.mx;x.fillStyle=hpPct>.5?'#0f0':hpPct>.25?'#ff0':'#f00';x.fillRect(bx-bw*.6,by-bh-12,bw*1.2*hpPct,6);x.fillStyle='#fff';x.font='bold 11px Segoe UI';x.textAlign='center';x.fillText(boss.hp+'/'+boss.mx,bx,by-bh-8);x.restore()}function drX(){x.save();for(var i=0;i<ex.length;i++){var f=ex[i];x.globalAlpha=Math.min(1,f.lf/15);var cc=f.cs[~~(Math.random()*f.cs.length)];x.fillStyle=cc;x.shadowColor=cc;x.shadowBlur=12;x.beginPath();x.arc(f.x,f.y,f.sz*(f.lf/25+.3),0,Math.PI*2);x.fill()}x.restore()}
function drS(){x.save();for(var i=0;i<80;i++){var sx=(i*137.5+43)%W,sy=(i*89.3+Date.now()*.02*(.5+(i%3)*.3))%H,sz=.5+(i%3)*.5;x.fillStyle='#fff';x.globalAlpha=.3+(i%5)*.12;x.fillRect(sx,sy,sz,sz)}x.restore()}

document.addEventListener("keydown",function(e){ky[e.key]=1;if((e.key==" "||e.key=="Enter")&&gs!=S.PLAYING)doStart()});document.addEventListener("keyup",function(e){ky[e.key]=0});c.addEventListener('mousedown',function(e){if(gs!=S.PLAYING)doStart();else mv(e.clientX)});c.addEventListener('mousemove',function(e){if(gs==S.PLAYING)mv(e.clientX)});c.addEventListener('touchstart',function(e){e.preventDefault();var t=e.changedTouches[0];touchId=t.identifier;if(gs!=S.PLAYING)doStart();else mv(t.clientX)},{passive:false});c.addEventListener('touchmove',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++){if(e.changedTouches[i].identifier===touchId){mv(e.changedTouches[i].clientX);break}}},{passive:false});c.addEventListener('touchend',function(e){e.preventDefault();touchId=null},{passive:false});c.addEventListener('touchcancel',function(){touchId=null},{passive:false});
